services:
  web:
    build: .
    profiles: ["full"]
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next:/app/.next
      - ~/.aws:/root/.aws:ro
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://sfdev:sfdev@db:5432/sfdev
      - WATCHPACK_POLLING=true
    env_file:
      - .env.local

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sfdev
      POSTGRES_PASSWORD: sfdev
      POSTGRES_DB: sfdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sfdev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  node_modules:
  next:
  pgdata:
