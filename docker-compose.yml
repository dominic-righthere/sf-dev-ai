services:
  web:
    build: .
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next:/app/.next
      - ~/.aws:/root/.aws:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sf-dev-ai.rule=Host(`sf-dev.localhost`)"
      - "traefik.http.routers.sf-dev-ai.entrypoints=web,websecure"
      - "traefik.http.routers.sf-dev-ai.tls=true"
      - "traefik.http.services.sf-dev-ai.loadbalancer.server.port=3000"
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://sfdev:sfdev@db:5432/sfdev
      - WATCHPACK_POLLING=true
    env_file:
      - .env.local

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sfdev
      POSTGRES_PASSWORD: sfdev
      POSTGRES_DB: sfdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sfdev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  node_modules:
  next:
  pgdata:

networks:
  traefik-public:
    external: true
